<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@700;900&display=swap');
  body { margin: 0; width: 1200px; height: 630px; overflow: hidden; background: #0d1117; font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; position: relative; }
  .orb { position: absolute; border-radius: 50%; filter: blur(100px); }
  .o1 { width: 500px; height: 500px; background: #3b82f6; top: -150px; left: -100px; opacity: .3; }
  .o2 { width: 400px; height: 400px; background: #a855f7; bottom: -100px; right: -50px; opacity: .25; }
  .inner { position: relative; z-index: 1; text-align: center; }
  .logo { width: 80px; height: 80px; background: linear-gradient(135deg,#3b82f6,#a855f7); border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 42px; font-weight: 900; color: #fff; margin: 0 auto 24px; }
  h1 { font-size: 56px; font-weight: 900; color: #e6edf3; letter-spacing: -2px; margin: 0 0 16px; }
  .grad { background: linear-gradient(135deg,#3b82f6,#a855f7,#06b6d4); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
  p { font-size: 22px; color: #8b949e; font-weight: 700; margin: 0; }
</style></head>
<body>
  <div class="orb o1"></div><div class="orb o2"></div>
  <div class="inner">
    <div class="logo">A</div>
    <h1>Aicraft</h1>
    <p>Pure C machine-learning framework. <span class="grad">No dependencies.</span></p>
  </div>
</body></html>
